<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Goose">
<link rel="manifest" href="/manifest.json">
<title>Goose</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --fg:#c9d1d9;--fg2:#8b949e;--accent:#58a6ff;--accent2:#1f6feb;
  --red:#f85149;--green:#3fb950;--yellow:#d2991d;
  --radius:8px;--font:system-ui,-apple-system,sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body{font-family:var(--font);background:var(--bg);color:var(--fg);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;min-height:44px;
}
header h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px}
header h1 span{color:var(--accent)}
.status{font-size:12px;color:var(--fg2);display:flex;align-items:center;gap:6px}
.status .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.status .dot.err{background:var(--red)}
.status select{background:var(--bg3);color:var(--fg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:12px}

#chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.msg{max-width:90%;padding:8px 12px;border-radius:var(--radius);line-height:1.5;font-size:14px;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--accent2);color:#fff}
.msg.assistant{align-self:flex-start;background:var(--bg2);border:1px solid var(--border)}
.msg.assistant.streaming{border-color:var(--accent)}
.msg.assistant pre{background:var(--bg3);border-radius:4px;padding:8px;margin:4px 0;overflow-x:auto;font-size:13px}
.msg.assistant code{font-size:13px;background:var(--bg3);padding:1px 4px;border-radius:3px}
.msg.assistant pre code{background:none;padding:0}
.msg.system{align-self:center;font-size:12px;color:var(--fg2);font-style:italic;background:none;border:none}
.thinking{font-size:13px;color:var(--fg2);font-style:italic;padding:4px 12px}

#input-area{
  flex-shrink:0;padding:8px 12px calc(8px + var(--safe-bottom));
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:flex-end;
}
#input-area textarea{
  flex:1;resize:none;background:var(--bg);color:var(--fg);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 12px;font-size:14px;font-family:var(--font);
  min-height:40px;max-height:120px;line-height:1.4;outline:none;
}
#input-area textarea:focus{border-color:var(--accent)}
#input-area button{
  background:var(--accent2);color:#fff;border:none;border-radius:var(--radius);
  padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;
  white-space:nowrap;flex-shrink:0;min-height:40px;
}
#input-area button:disabled{opacity:0.5;cursor:not-allowed}
#input-area button.stop{background:var(--red)}

.loading{display:flex;justify-content:center;padding:20px;color:var(--fg2)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--fg2);padding:40px 20px;font-size:14px}

/* Tool call styling */
.tool-call{font-size:12px;color:var(--yellow);padding:2px 12px;font-style:italic}

.auth-overlay{
  position:fixed;inset:0;background:var(--bg);display:flex;
  align-items:center;justify-content:center;z-index:100;
}
.auth-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:24px;max-width:360px;width:90%;text-align:center;
}
.auth-box h2{margin-bottom:16px;font-size:18px}
.auth-box p{color:var(--fg2);font-size:14px;margin-bottom:16px}
.auth-box input{
  width:100%;background:var(--bg);color:var(--fg);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 12px;font-size:14px;margin-bottom:12px;outline:none
}
.auth-box input:focus{border-color:var(--accent)}
.auth-box button{
  width:100%;background:var(--accent2);color:#fff;border:none;border-radius:var(--radius);
  padding:10px;font-size:14px;font-weight:600;cursor:pointer
}
.error-msg{color:var(--red);font-size:13px;margin-top:8px;display:none}

/* Settings panel */
#settings-btn{background:none;border:none;color:var(--fg2);font-size:18px;cursor:pointer;padding:4px}
.settings-panel{
  display:none;position:fixed;inset:0;background:var(--bg);z-index:99;
  flex-direction:column;padding:24px;
}
.settings-panel.open{display:flex}
.settings-panel h2{margin-bottom:16px}
.settings-panel label{font-size:13px;color:var(--fg2);margin-bottom:4px}
.settings-panel input{
  background:var(--bg);color:var(--fg);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 12px;font-size:14px;margin-bottom:12px;
}
.settings-panel button{
  background:var(--accent2);color:#fff;border:none;border-radius:var(--radius);
  padding:10px;font-size:14px;cursor:pointer;margin-top:8px
}
</style>
</head>
<body>

<!-- Auth overlay -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-box">
    <h2>🔑 Goose Server</h2>
    <p>Enter the goosed server URL. Secret key is optional — leave blank if using the proxy.</p>
    <input type="url" id="server-url" placeholder="https://goose.example.com" autocomplete="url">
    <input type="password" id="server-secret" placeholder="Secret key (X-Secret-Key)">
    <button onclick="connect()">Connect</button>
    <p class="error-msg" id="auth-error">Connection failed. Check URL and secret.</p>
  </div>
</div>

<!-- Settings panel -->
<div class="settings-panel" id="settings">
  <h2>Settings</h2>
  <label>Server URL</label>
  <input type="url" id="set-url">
  <label>Secret Key</label>
  <input type="password" id="set-secret">
  <button onclick="saveSettings()">Save & Reconnect</button>
  <button style="background:var(--bg3);margin-top:4px" onclick="closeSettings()">Cancel</button>
</div>

<header>
  <h1><span>🪿</span> Goose</h1>
  <div class="status">
    <select id="session-select" onchange="switchSession(this.value)"><option value="">New session</option></select>
    <span class="dot" id="status-dot"></span>
    <button id="settings-btn" onclick="openSettings()" title="Settings">⚙</button>
    <span id="model-name" style="font-size:12px;color:var(--fg2)"></span>
  </div>
</header>

<div id="chat"></div>

<div id="input-area">
  <textarea id="prompt" rows="1" placeholder="Message Goose…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
// ── State ──
let BASE = '';
let SECRET = '';
let sessionId = crypto.randomUUID();
let currentAssistantMsg = null;
let abortCtrl = null;

// ── Persistence ──
function loadAuth() {
  BASE = localStorage.getItem('goose_web_url') || window.location.origin;
  SECRET = localStorage.getItem('goose_web_secret') || '';
  document.getElementById('server-url').value = BASE;
  document.getElementById('server-secret').value = SECRET;
}
function saveAuth(url, secret) {
  BASE = url.replace(/\/$/, '');
  SECRET = secret;
  localStorage.setItem('goose_web_url', BASE);
  localStorage.setItem('goose_web_secret', SECRET);
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('auth-error').style.display = 'none';
  init();
}

// ── API helpers ──
async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (SECRET) headers['X-Secret-Key'] = SECRET;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(BASE + path, opts);
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`${res.status}: ${text}`);
  }
  return res;
}

// ── Connection ──
async function connect() {
  const url = document.getElementById('server-url').value.trim();
  const secret = document.getElementById('server-secret').value.trim();
  if (!url) return;
  try {
    const headers = {};
    if (secret) headers['X-Secret-Key'] = secret;
    const res = await fetch(url.replace(/\/$/, '') + '/status', { headers });
    if (!res.ok) throw new Error('status check failed');
    saveAuth(url, secret);
  } catch (e) {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').textContent = 'Connection failed: ' + e.message;
  }
}

// ── Init ──
async function init() {
  document.getElementById('status-dot').classList.remove('err');
  try {
    await api('GET', '/status');
  } catch (e) {
    document.getElementById('status-dot').classList.add('err');
  }
  await loadSessions();
}

async function loadSessions() {
  try {
    const res = await api('GET', '/sessions');
    const data = await res.json();
    const list = data.sessions || (Array.isArray(data) ? data : []);
    const sel = document.getElementById('session-select');
    sel.innerHTML = '<option value="">+ New session</option>';
    if (Array.isArray(list)) {
      list.reverse().forEach(s => {
        sel.innerHTML += `<option value="${s.id}">${escapeHtml(s.name || s.id)}</option>`;
      });
    }
  } catch (e) { /* ignore */ }
}

async function switchSession(id) {
  if (!id) { sessionId = crypto.randomUUID(); return; }
  sessionId = id;
}

// ── Send message ──
async function sendMessage() {
  const input = document.getElementById('prompt');
  const text = input.value.trim();
  if (!text || abortCtrl) return;
  input.value = '';
  input.style.height = 'auto';

  const chat = document.getElementById('chat');
  chat.querySelector('.empty')?.remove();

  abortCtrl = new AbortController();

  appendMessage('user', text, false);

  currentAssistantMsg = appendMessage('assistant', '', true);

  const thinking = document.createElement('div');
  thinking.className = 'thinking';
  thinking.textContent = 'Thinking…';
  chat.appendChild(thinking);
  scrollDown();

  document.getElementById('send-btn').textContent = 'Stop';
  document.getElementById('send-btn').className = 'stop';
  document.getElementById('send-btn').onclick = stopStream;

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (SECRET) headers['X-Secret-Key'] = SECRET;
    const res = await fetch(BASE + '/reply', {
      method: 'POST',
      headers,
      body: JSON.stringify({
        user_message: {
          role: 'user',
          content: [{ type: 'text', text }],
          created: Math.floor(Date.now() / 1000),
          metadata: { userVisible: true, agentVisible: true }
        },
        session_id: sessionId
      }),
      signal: abortCtrl.signal,
    });

    if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);

    thinking.remove();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try { handleEvent(JSON.parse(line.slice(6)), chat); } catch(e) {}
        }
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      thinking.remove();
      currentAssistantMsg?.remove();
      const err = document.createElement('div');
      err.className = 'msg assistant';
      err.textContent = 'Error: ' + e.message;
      err.style.borderColor = 'var(--red)';
      chat.appendChild(err);
    }
  }

  currentAssistantMsg = null;
  abortCtrl = null;
  document.getElementById('send-btn').textContent = 'Send';
  document.getElementById('send-btn').className = '';
  document.getElementById('send-btn').onclick = sendMessage;
  document.getElementById('prompt').focus();

  await loadSessions();
  document.getElementById('session-select').value = sessionId;
}

function stopStream() {
  if (abortCtrl) abortCtrl.abort();
}

function handleEvent(event, chat) {
  switch (event.type) {
    case 'Message': {
      if (!currentAssistantMsg) currentAssistantMsg = appendMessage('assistant', '', true);
      const c = event.message?.content;
      if (Array.isArray(c)) {
        currentAssistantMsg.innerHTML = c.map(x => x.type === 'text' ? renderMarkdown(x.text) : '').join('');
      } else if (typeof c === 'string') {
        currentAssistantMsg.innerHTML = renderMarkdown(c);
      }
      scrollDown();
      break;
    }
    case 'Finish':
      currentAssistantMsg?.classList.remove('streaming');
      break;
    case 'Error': {
      if (currentAssistantMsg) { currentAssistantMsg.classList.remove('streaming'); currentAssistantMsg.style.borderColor = 'var(--red)'; }
      const err = document.createElement('div');
      err.className = 'msg system';
      err.textContent = 'Error: ' + (event.error || 'unknown');
      err.style.color = 'var(--red)';
      chat.appendChild(err);
      break;
    }
    case 'ModelChange': {
      const el = document.createElement('div');
      el.className = 'thinking';
      el.textContent = `Using ${event.model || '…'}`;
      chat.appendChild(el);
      document.getElementById('model-name').textContent = event.model || '';
      break;
    }
    // Ping, Notification, UpdateConversation — silently ignored
  }
}

function appendMessage(role, content, streaming) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (streaming) div.classList.add('streaming');
  if (role === 'assistant' && content) {
    div.innerHTML = renderMarkdown(content);
  } else if (content) {
    div.textContent = content;
  }
  chat.appendChild(div);
  scrollDown();
  return div;
}

function renderMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escapeHtml(str) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
  return String(str).replace(/[&<>"]/g, c => map[c]);
}

function scrollDown() {
  const chat = document.getElementById('chat');
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
}

// ── Settings ──
function openSettings() {
  document.getElementById('set-url').value = BASE;
  document.getElementById('set-secret').value = SECRET;
  document.getElementById('settings').classList.add('open');
}
function closeSettings() { document.getElementById('settings').classList.remove('open'); }
function saveSettings() {
  saveAuth(document.getElementById('set-url').value.trim(), document.getElementById('set-secret').value.trim());
  closeSettings();
}

// ── Textarea auto-resize ──
document.getElementById('prompt').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── Startup ──
loadAuth();
if (BASE) {
  document.getElementById('auth-overlay').style.display = 'none';
  init();
} else {
  document.getElementById('auth-overlay').style.display = 'flex';
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
